name: Aggregate fair prices

# Continuously builds data/fair_prices.json (a per-SKU Auction House
# fair-price/volume/confidence snapshot — see scripts/aggregate_fair_prices.py)
# by polling Hypixel's public auctions_ended endpoint on a schedule, running
# on GitHub's own infrastructure rather than any player's client. Every
# Saibon client downloads this snapshot on startup (same mechanism as
# data/items.json/data/recipes.json), so a brand-new install shows real
# Auction House flips on day one instead of waiting hours for its own local
# polling to build a sample — Hypixel's API only exposes a rolling ~60s
# window per request, so there is no way to back-fill that locally.
#
# Runs on a schedule: this workflow makes an automated commit to this repo
# roughly every 15 minutes, continuously, once merged to master.
# `workflow_dispatch` is also available to trigger one run manually from the
# Actions tab.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Aggregate fair prices
        run: python scripts/aggregate_fair_prices.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fair_prices.json data/.sales_history_raw.json data/index.json
          git diff --cached --quiet || git commit -m "Update fair-price snapshot"
          git push

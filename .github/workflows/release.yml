name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Locate jar
        id: jar
        run: |
          jar=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-sources.jar")
          echo "path=$jar" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## v/ { in_section = ($0 ~ "^## v" ver "([^0-9.].*)?$") }
            in_section { print }
          ' RELEASE.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No RELEASE.md section found for version $version" >&2
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          body_path: release-notes.md

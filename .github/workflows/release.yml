name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Locate jar
        id: jar
        run: |
          jar=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-sources.jar")
          echo "path=$jar" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## v/ { in_section = ($0 ~ "^## v" ver "([^0-9.].*)?$") }
            in_section { print }
          ' RELEASE.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No RELEASE.md section found for version $version" >&2
            exit 1
          fi

      - name: Build version manifest
        run: |
          version="${GITHUB_REF_NAME#v}"
          jar="${{ steps.jar.outputs.path }}"
          jarname=$(basename "$jar")
          sha=$(sha256sum "$jar" | cut -d' ' -f1)
          min_version=$(grep -oP '"minecraft":\s*">=\K[0-9.]+' src/main/resources/fabric.mod.json)
          jq -n --arg v "$version" --arg min "$min_version" \
            --arg url "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/$jarname" \
            --arg sha "$sha" \
            --arg changelogUrl "https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}" \
            --rawfile changelog release-notes.md \
            '{latestVersion:$v,minGameVersion:$min,downloadUrl:$url,sha256:$sha,changelogUrl:$changelogUrl,changelog:$changelog}' \
            > version.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.jar.outputs.path }}
            version.json
          body_path: release-notes.md
